<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="icon" href="icon.png" />
    <title>RawPhotoForge</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:
                linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            color: #e0e0e0;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            background:
                radial-gradient(
                    ellipse at top,
                    rgba(255,120,0,0.15),
                    transparent
                ),
                radial-gradient(
                    ellipse at bottom,
                    rgba(255,80,20,0.1),
                    transparent
                );
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;

            background:
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 100px,
                    rgba(255,120,0,0.03) 100px,
                    rgba(255,120,0,0.03) 102px
                ),
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 100px,
                    rgba(255,120,0,0.03) 100px,
                    rgba(255,120,0,0.03) 102px
                );

            pointer-events: none;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 1200px;
        }

        h1 {
            font-size: 5rem;
            font-weight: 900;
            margin-bottom: 1rem;

            background:
                linear-gradient(
                    135deg,
                    #ff7800 0%,
                    #ffb347 50%,
                    #ff6b35 100%
                );

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;

            text-shadow: 0 0 40px rgba(255,120,0,0.3);

            animation: glow 3s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                filter: drop-shadow(0 0 20px rgba(255,120,0,0.4));
            }

            to {
                filter: drop-shadow(0 0 40px rgba(255,120,0,0.6));
            }
        }

        .subtitle {
            font-size: 1.8rem;
            color: #ff9f66;
            margin-bottom: 2rem;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .description {
            font-size: 1.2rem;
            max-width: 900px;
            margin: 0 auto 3rem;
            color: #b0b0b0;
            line-height: 1.8;
        }

        .cta-buttons {
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 3rem;
        }

        .btn {
            padding: 1.2rem 3rem;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 50px;
            transition: all .3s;
            display: inline-block;
        }

        .btn-primary {
            background:
                linear-gradient(
                    135deg,
                    #ff7800,
                    #ff6b35
                );

            color: white;

            box-shadow:
                0 10px 30px rgba(255,120,0,0.4);
        }

        .btn-secondary {
            background: rgba(255,120,0,0.1);
            color: #ff9f66;
            border: 2px solid #ff7800;
        }

        .btn:hover,
        .btn-small:hover,
        .tech-badge:hover {
            transform: translateY(-4px);
        }

        .section {
            padding: 5rem 2rem;
            position: relative;
        }

        .section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;

            transform: translateX(-50%);

            width: 80%;
            height: 1px;

            background:
                linear-gradient(
                    90deg,
                    transparent,
                    #ff7800,
                    transparent
                );
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 3rem;
            text-align: center;
            margin-bottom: 3rem;
            color: #ff9f66;

            position: relative;
            display: inline-block;
            left: 50%;

            transform: translateX(-50%);
        }

        .features-grid {
            display: grid;
            grid-template-columns:
                repeat(auto-fit, minmax(320px,1fr));

            gap: 2rem;
            margin-top: 3rem;
        }

        .feature-card {
            background:
                linear-gradient(
                    135deg,
                    rgba(255,120,0,0.05),
                    rgba(255,107,53,0.05)
                );

            border: 1px solid rgba(255,120,0,0.2);
            border-radius: 20px;

            padding: 2.5rem;

            transition: all .3s;
        }

        .feature-card:hover {
            transform: translateY(-10px);

            box-shadow:
                0 20px 40px rgba(255,120,0,0.2);

            border-color: #ff7800;
        }

        .feature-icon {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            display: block;
        }

        .feature-title {
            font-size: 1.5rem;
            color: #ff9f66;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .feature-description {
            color: #b0b0b0;
            line-height: 1.8;
        }

        .tech-stack {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            justify-content: center;
            margin-top: 2rem;
        }

        .tech-badge {
            background: rgba(255,120,0,0.1);
            border: 2px solid rgba(255,120,0,0.3);

            padding: 1rem 2rem;

            border-radius: 30px;

            font-weight: 600;
            color: #ff9f66;

            transition: all .3s;
        }

        .download-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 2rem;
        }

        .btn-small {
            padding: .8rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 30px;
            transition: all .3s;
            display: inline-block;
        }

        .btn-download {
            background:
                linear-gradient(
                    135deg,
                    #ff7800,
                    #ff6b35
                );

            color: white;

            box-shadow:
                0 5px 15px rgba(255,120,0,0.3);
        }

        .language-switch {
            position: fixed;
            top: 2rem;
            right: 2rem;

            z-index: 1000;

            display: flex;
            align-items: center;
            gap: .5rem;

            background: rgba(0,0,0,0.3);

            padding: .5rem 1rem;

            border-radius: 50px;

            backdrop-filter: blur(5px);
        }

        .lang-text {
            font-weight: 600;
            color: #ff9f66;
            user-select: none;
        }

        .switch {
            position: relative;
            display: inline-block;

            width: 50px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;

            background-color: #555;

            transition: .4s;
        }

        .slider::before {
            position: absolute;

            content: "";

            height: 18px;
            width: 18px;

            left: 3px;
            bottom: 3px;

            background-color: white;

            transition: .4s;
        }

        input:checked + .slider {
            background-color: #ff7800;
        }

        input:checked + .slider::before {
            transform: translateX(26px);
        }

        .slider.round {
            border-radius: 34px;
        }

        .slider.round::before {
            border-radius: 50%;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 2rem;
            left: 50%;

            transform: translateX(-50%);

            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%,20%,50%,80%,100% {
                transform:
                    translateX(-50%)
                    translateY(0);
            }

            40% {
                transform:
                    translateX(-50%)
                    translateY(-20px);
            }

            60% {
                transform:
                    translateX(-50%)
                    translateY(-10px);
            }
        }

        .scroll-indicator span {
            display: block;

            width: 30px;
            height: 50px;

            border: 3px solid #ff7800;
            border-radius: 25px;

            position: relative;
        }

        .scroll-indicator span::before {
            content: '';

            position: absolute;

            top: 10px;
            left: 50%;

            transform: translateX(-50%);

            width: 6px;
            height: 6px;

            background: #ff7800;
            border-radius: 50%;

            animation: scroll 2s infinite;
        }

        @keyframes scroll {
            0% {
                opacity: 1;

                transform:
                    translateX(-50%)
                    translateY(0);
            }

            100% {
                opacity: 0;

                transform:
                    translateX(-50%)
                    translateY(20px);
            }
        }

        @media (max-width:768px) {
            h1 {
                font-size: 3rem;
            }

            .subtitle {
                font-size: 1.3rem;
            }

            .section-title {
                font-size: 2rem;
            }

            .download-buttons {
                flex-direction: column;
            }

            .btn-small {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>

<body>

    <div class="language-switch">
        <span class="lang-text">JA</span>

        <label class="switch">
            <input type="checkbox" id="lang-toggle">
            <span class="slider round"></span>
        </label>

        <span class="lang-text">EN</span>
    </div>

    <section class="hero">
        <div class="hero-content">

            <h1 data-i18n-key="title">
                RawPhotoForge
            </h1>

            <div class="subtitle" data-i18n-key="subtitle">
                GPU Photo Editor Project
            </div>

            <p class="description" data-i18n-key="description"></p>

            <div class="cta-buttons">

                <a
                    href="https://kingyo1205.github.io/RawPhotoForge/web/dist/index.html"
                    class="btn btn-primary"
                    target="_blank"
                    data-i18n-key="openWebApp"
                >
                    Open Web App
                </a>

                <a
                    href="https://github.com/kingyo1205/RawPhotoForge"
                    class="btn btn-secondary"
                    target="_blank"
                >
                    Repository
                </a>

            </div>
        </div>

        <div class="scroll-indicator">
            <span></span>
        </div>
    </section>

    <section class="section">
        <div class="container">

            <h2 class="section-title" data-i18n-key="editionsTitle">
                Editions
            </h2>

            <div class="features-grid">

                <div class="feature-card">

                    <span class="feature-icon">
                        🌐
                    </span>

                    <h3 class="feature-title">
                        RawPhotoForge Web
                    </h3>

                    <p class="feature-description" data-i18n-key="webVersionDesc"></p>

                    <div class="download-buttons">
                        <a
                            href="https://kingyo1205.github.io/RawPhotoForge/web/dist/index.html"
                            class="btn-small btn-download"
                            target="_blank"
                        >
                            Open App
                        </a>
                    </div>
                </div>

                <div class="feature-card">

                    <span class="feature-icon">
                        🦀
                    </span>

                    <h3 class="feature-title">
                        RawPhotoForge Desktop
                    </h3>

                    <p class="feature-description" data-i18n-key="desktopVersionDesc"></p>

                    <div class="download-buttons">
                        <a
                            href="https://github.com/kingyo1205/RawPhotoForge/releases"
                            class="btn-small btn-download"
                            target="_blank"
                        >
                            Releases
                        </a>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <section class="section">
        <div class="container">

            <h2 class="section-title" data-i18n-key="techStackTitle">
                Tech Stack
            </h2>

            <div class="tech-stack">
                <div class="tech-badge">TypeScript</div>
                <div class="tech-badge">WebGPU</div>
                <div class="tech-badge">Rust</div>
                <div class="tech-badge">wgpu</div>
                <div class="tech-badge">Godot Engine</div>
                <div class="tech-badge">GDExtension</div>
            </div>

            <div class="tech-stack">
                <div class="tech-badge" data-i18n-key="badge_static"></div>
                <div class="tech-badge" data-i18n-key="badge_crossplatform"></div>
                <div class="tech-badge" data-i18n-key="badge_gpu"></div>
                <div class="tech-badge" data-i18n-key="badge_nondestructive"></div>
            </div>

        </div>
    </section>

    <section
        class="section"
        style="text-align:center; padding:5rem 2rem;"
    >
        <div class="container">

            <h2
                class="section-title"
                data-i18n-key="getStartedTitle"
            ></h2>

            <p
                style="
                    font-size:1.2rem;
                    color:#b0b0b0;
                    margin-bottom:2rem;
                "
                data-i18n-key="getStartedDesc"
            ></p>

            <div class="cta-buttons">

                <a
                    href="https://kingyo1205.github.io/RawPhotoForge/web/dist/index.html"
                    class="btn btn-primary"
                    target="_blank"
                    data-i18n-key="openWebApp"
                ></a>

                <a
                    href="https://github.com/kingyo1205/RawPhotoForge/releases"
                    class="btn btn-secondary"
                    target="_blank"
                    data-i18n-key="getStartedBtn1"
                ></a>

                <a
                    href="https://github.com/kingyo1205/RawPhotoForge"
                    class="btn btn-secondary"
                    target="_blank"
                    data-i18n-key="getStartedBtn2"
                ></a>

            </div>

            <p
                style="
                    opacity:0.8;
                    margin-top:1.2rem;
                    font-size:0.9rem;
                "
                data-i18n-key="legacyNote"
            ></p>

        </div>
    </section>

    <script>
        document.addEventListener('DOMContentLoaded', () => {

            const translations = {

                title: {
                    ja: 'RawPhotoForge',
                    en: 'RawPhotoForge'
                },

                subtitle: {
                    ja: 'GPU Photo Editor Project',
                    en: 'GPU Photo Editor Project'
                },

                description: {
                    ja:
                        'RawPhotoForgeはWebGPUベースのWeb版と、Rust + Godotベースのデスクトップ版を開発しているGPU写真編集プロジェクトです。高速なGPUアクセラレーション、非破壊編集、クロスプラットフォーム設計を重視しています。',
                    en:
                        'RawPhotoForge is a GPU photo editing project developing both a WebGPU-based web version and a Rust + Godot desktop version. The project focuses on fast GPU acceleration, non-destructive editing, and cross-platform design.'
                },

                editionsTitle: {
                    ja: 'Editions',
                    en: 'Editions'
                },

                webVersionDesc: {
                    ja:
                        'WebGPUベースのブラウザ版。PPM画像対応。静的ホスティング対応。インストール不要。',
                    en:
                        'Browser-based editor using WebGPU. Supports PPM images. Static hosting compatible. No installation required.'
                },

                desktopVersionDesc: {
                    ja:
                        'Rust + Godotベースのネイティブ版。RAW対応。wgpuによるGPUアクセラレーション。高性能な非破壊編集。',
                    en:
                        'Native desktop version built with Rust and Godot. RAW support. GPU acceleration via wgpu. High-performance non-destructive editing.'
                },

                techStackTitle: {
                    ja: '技術スタック',
                    en: 'Tech Stack'
                },

                badge_static: {
                    ja: '静的ホスティング',
                    en: 'Static Hosting'
                },

                badge_crossplatform: {
                    ja: 'クロスプラットフォーム',
                    en: 'Cross Platform'
                },

                badge_gpu: {
                    ja: 'GPU Accelerated',
                    en: 'GPU Accelerated'
                },

                badge_nondestructive: {
                    ja: '非破壊編集',
                    en: 'Non-destructive'
                },

                getStartedTitle: {
                    ja: '始めよう',
                    en: 'Get Started'
                },

                getStartedDesc: {
                    ja:
                        '今すぐRawPhotoForgeを使って、高速なGPU写真編集を体験しよう。',
                    en:
                        'Start using RawPhotoForge now and experience fast GPU photo editing.'
                },

                openWebApp: {
                    ja: 'Webアプリを開く',
                    en: 'Open Web App'
                },

                getStartedBtn1: {
                    ja: 'Desktop Releases',
                    en: 'Desktop Releases'
                },

                getStartedBtn2: {
                    ja: 'GitHub Repository',
                    en: 'GitHub Repository'
                },

                legacyNote: {
                    ja:
                        'Legacy: Python版はリポジトリ内の <code>python-legacy/</code> に保存されています。',
                    en:
                        'Legacy: The Python version is preserved in the repository under <code>python-legacy/</code>.'
                }
            };

            const langToggle =
                document.getElementById('lang-toggle');

            const translatableElements =
                document.querySelectorAll('[data-i18n-key]');

            const setLanguage = (lang) => {

                document.documentElement.lang = lang;

                if (
                    translations.title &&
                    translations.title[lang]
                ) {
                    document.title =
                        translations.title[lang];
                }

                translatableElements.forEach(el => {

                    const key =
                        el.getAttribute('data-i18n-key');

                    if (!key) {
                        return;
                    }

                    const entry = translations[key];

                    if (!entry) {
                        return;
                    }

                    el.innerHTML = entry[lang];
                });

                localStorage.setItem('lang', lang);

                langToggle.checked = (lang === 'en');
            };

            langToggle.addEventListener('change', event => {

                setLanguage(
                    event.target.checked ? 'en' : 'ja'
                );
            });

            const getInitialLanguage = () => {

                const saved =
                    localStorage.getItem('lang');

                if (saved) {
                    return saved;
                }

                const nav =
                    navigator.language ||
                    navigator.userLanguage ||
                    'en';

                return nav
                    .toLowerCase()
                    .startsWith('ja')
                    ? 'ja'
                    : 'en';
            };

            setLanguage(getInitialLanguage());
        });
    </script>

</body>
</html>
